<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Heartopia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🗺️ Carte Heartopia</h1>

<!-- FILTRES (USER + ADMIN) -->
<div id="modeSelector">
    <button id="btnUser" onclick="setMode('user')">👀 Mode utilisateur</button>
    <button id="btnAdmin" onclick="setMode('admin')">🔐 Mode admin</button>
</div>

<div id="adminPanel" class="hidden">
    <button onclick="exportPlacesToJSON()">📤 Exporter</button>
    <button onclick="triggerImport()">📥 Importer</button>
    <input type="file" id="importFile" class="hidden" onchange="importPlacesFromJSON(event)">
</div>
<div class="filters">
    <label><input type="checkbox" value="poisson" checked> Poissons</label>
    <label><input type="checkbox" value="oiseau" checked> Oiseaux</label>
    <label><input type="checkbox" value="insecte" checked> Insectes</label>
    <label><input type="checkbox" value="collectible" checked> Collectibles</label>
</div>

<div id="map-container">
    <img src="map.jpg" id="map">
</div>

<!-- 🟢 PANNEAU INFO -->
<div id="panel">
    <h3 id="placeTitle">Aucun lieu sélectionné</h3>
</div>

<!-- 🔵 PANNEAU ADMIN (caché par défaut) -->
<div id="adminPanel" class="hidden">

    <div class="admin-buttons">

        <button onclick="enableAdminMode()">🔐 Mode admin</button>

        <div class="item-buttons">
            <button onclick="addItem('poisson')">🐟 Poisson</button>
            <button onclick="addItem('oiseau')">🐦 Oiseau</button>
            <button onclick="addItem('insecte')">🐛 Insecte</button>
            <button onclick="addItem('collectible')">🌿 Collectible</button>
        </div>

        <div class="data-buttons">
            <button onclick="exportPlacesToJSON()">📤 Exporter map</button>
            <input type="file" onchange="importPlacesFromJSON(event)">
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
